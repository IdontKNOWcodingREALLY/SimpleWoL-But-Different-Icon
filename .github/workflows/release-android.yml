name: Build Android
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

jobs:
  release-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: "17"
          cache: 'gradle'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.10.5"
          channel: 'stable'
          cache: true
          
      - name: Get dependencies
        run: flutter pub get

      # FIX 1: This forces the app to crop and apply your new icon images
      - name: Update App Icons
        run: dart run flutter_launcher_icons
        
      - name: Build Release APK
        run: flutter build apk --release

      # FIX 2: This creates a temporary signature on the server and signs the APK so your phone will let you install it
      - name: Auto-Sign APK for Installation
        run: |
          keytool -genkey -v -keystore temp_key.keystore -alias temp_alias -keyalg RSA -keysize 2048 -validity 10000 -storepass temp_password -keypass temp_password -dname "CN=SimpleWOL,O=Personal,C=US"
          BUILD_TOOLS_VERSION=$(ls $ANDROID_HOME/build-tools | sort -n | tail -1)
          $ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION/apksigner sign --ks temp_key.keystore --ks-pass pass:temp_password build/app/outputs/flutter-apk/app-release.apk
        
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SimpleWOL-Release-APK
          path: build/app/outputs/flutter-apk/app-release.apk
